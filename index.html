<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Pages</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    header p {
      font-size: 1rem;
      color: #666;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .card {
      display: block;
      background: #fff;
      border: 1px solid #e0e0de;
      border-radius: 10px;
      padding: 1.25rem 1.25rem 1rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .card:hover {
      border-color: #aaa;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      transform: translateY(-2px);
    }

    .card:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .card-icon {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      display: block;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .card-desc {
      font-size: 0.82rem;
      color: #888;
      line-height: 1.5;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #141414; color: #e8e8e8; }
      .card { background: #1e1e1e; border-color: #2e2e2e; }
      .card:hover { border-color: #555; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
      .card-desc { color: #777; }
      header p { color: #888; }
      footer { color: #555; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>My GitHub Pages</h1>
      <p>A collection of pages and projects.</p>
    </header>

    <div class="grid">
      <!-- 
        To add a page, copy one <a class="card"> block below.
        Set href to the filename, e.g. href="about.html"
        Change the icon (emoji), title, and description.
      -->

      <a class="card" href="about.html">
        <span class="card-icon">👤</span>
        <div class="card-title">About</div>
        <div class="card-desc">Learn more about me and this site.</div>
      </a>

      <a class="card" href="projects.html">
        <span class="card-icon">🛠️</span>
        <div class="card-title">Projects</div>
        <div class="card-desc">A showcase of things I've built.</div>
      </a>

      <a class="card" href="blog.html">
        <span class="card-icon">📝</span>
        <div class="card-title">Blog</div>
        <div class="card-desc">Thoughts, notes, and writing.</div>
      </a>

      <a class="card" href="contact.html">
        <span class="card-icon">✉️</span>
        <div class="card-title">Contact</div>
        <div class="card-desc">Get in touch with me.</div>
      </a>

    </div>

    <footer>
      Hosted on <a href="https://pages.github.com" style="color: inherit;">GitHub Pages</a>
    </footer>
  </div>
</body>
</html>
